name: Vercel Preview Deploy

on:
  workflow_dispatch:
  push:
    branches: ["claude/nice-keller-ur7mnt"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -o pipefail
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx --yes vercel@latest deploy --yes --token "$VERCEL_TOKEN" --scope alphapromenas-projects 2>&1 | tee deploy.log
          URL=$(grep -Eo 'https://[a-z0-9.-]+\.vercel\.app' deploy.log | tail -1)
          echo "PREVIEW_URL=$URL"
          echo "### ✅ Preview deployed: $URL" >> "$GITHUB_STEP_SUMMARY"
