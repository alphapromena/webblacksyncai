name: Vercel Preview Deploy

on:
  workflow_dispatch:
    inputs:
      vercel_token:
        description: "Short-lived Vercel token"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Mask token in logs
        run: echo "::add-mask::${{ inputs.vercel_token }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ inputs.vercel_token }}
        run: |
          set -o pipefail
          npx --yes vercel@latest deploy --yes --token "$VERCEL_TOKEN" --scope alphapromenas-projects 2>&1 | tee deploy.log
          URL=$(grep -Eo 'https://[a-z0-9.-]+\.vercel\.app' deploy.log | tail -1)
          echo "PREVIEW_URL=$URL"
          echo "### ✅ Preview deployed: $URL" >> "$GITHUB_STEP_SUMMARY"
