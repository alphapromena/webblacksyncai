name: Deploy to Vercel Production (blacksync.ai)

on:
  workflow_dispatch:
  push:
    branches: ["claude/nice-keller-ur7mnt"]
    paths: [".github/workflows/vercel-prod.yml"]

# IDs are not secret. This targets the project that owns www.blacksync.ai.
env:
  VERCEL_ORG_ID: team_ghx9RCoCKeZq5bJBgQqSIJ9B
  VERCEL_PROJECT_ID: prj_xmJ9IVXzczCb5jroKP1K1zyF2cJo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Guard token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Add a VERCEL_TOKEN repo secret (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi
      - name: Pull production settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build (production)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy prebuilt to production
        run: |
          set -o pipefail
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | tee /dev/stderr | tail -1)
          echo "### ✅ Promoted to production: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "### Domain: https://blacksync.ai" >> "$GITHUB_STEP_SUMMARY"

